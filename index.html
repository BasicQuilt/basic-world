<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Basic World</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #FFD400;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 60px 20px 20px;
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 3px;
    }

    .subtext {
      text-align: center;
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      border: 2px solid #FFD400;
      color: #FFD400;
      text-decoration: none;
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .button:hover {
      background: #FFD400;
      color: #000;
    }

    /* Wavy background lines */
    .wave {
      position: absolute;
      width: 200%;
      height: 200px;
      background: transparent;
      border-top: 2px solid #FFD400;
      opacity: 0.2;
      animation: waveMove 20s linear infinite;
    }

    .wave:nth-child(1) {
      top: 20%;
      animation-duration: 18s;
    }

    .wave:nth-child(2) {
      top: 40%;
      animation-duration: 25s;
      opacity: 0.15;
    }

    .wave:nth-child(3) {
      top: 60%;
      animation-duration: 30s;
      opacity: 0.1;
    }

    @keyframes waveMove {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- Wavy lines -->
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>

  <header>Basic World</header>

  <div class="subtext">
    An Algorand NFT Project
  </div>

  <div class="container">
    <p>Welcome to the world of Basic.</p>
    <p>More coming soon.</p>

    <!-- Optional link -->
    <a href="#" class="button">Enter</a>
  </div>

  <footer>
    © Basic World
  </footer>

</body>
</html>
